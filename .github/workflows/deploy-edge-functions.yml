name: Deploy Edge Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-edge-functions.yml"
      - "supabase/functions/**"

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - function: parse-email
            verify_jwt: false
          - function: ai-chat
            verify_jwt: false
          - function: weekly-digest
            verify_jwt: false
          - function: delete-account
            verify_jwt: true
          - function: private-backup-api
            verify_jwt: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
        with:
          version: 2.75.0

      - name: Deploy ${{ matrix.function }}
        run: |
          args=("${{ matrix.function }}" --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}")
          if [[ "${{ matrix.verify_jwt }}" == "false" ]]; then
            args+=(--no-verify-jwt)
          fi
          supabase functions deploy "${args[@]}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
