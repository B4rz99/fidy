name: Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint-gate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Root
            command: lint
          - name: Branded Boundaries
            command: lint-brands
          - name: ESLint
            command: lint-mobile
          - name: Lizard
            command: lint-complexity
          - name: File Size
            command: lint-file-size
          - name: Dependencies
            command: lint-dependency-policy
          - name: Expo Doctor
            command: doctor-expo
          - name: React Doctor
            command: doctor-react
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - name: Cache Bun install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run ${{ matrix.name }}
        env:
          CHECK_COMMAND: ${{ matrix.command }}
        run: |
          case "$CHECK_COMMAND" in
            lint) bun run lint ;;
            lint-brands) bun run lint:brands ;;
            lint-mobile) bun run lint:mobile ;;
            lint-complexity) bun run lint:complexity ;;
            lint-file-size) bun run lint:file-size ;;
            lint-dependency-policy) bun run lint:dependency-policy ;;
            doctor-expo) bun run doctor:expo ;;
            doctor-react) bun run doctor:react ;;
            *) echo "Unknown check command: $CHECK_COMMAND" >&2; exit 1 ;;
          esac

  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Dependency cruiser
        run: bun run lint:architecture


  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck workspace
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 26.1.0
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests with coverage
        run: bun run test:coverage

  crap:
    name: CRAP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 26.1.0
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run CRAP threshold gate
        run: bun run test:crap

  security-secrets:
    name: Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Fetch base ref
        run: git fetch origin ${{ github.event.pull_request.base.ref }}
      - name: Gitleaks — pattern-based secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: TruffleHog — verified secret scan
        uses: trufflesecurity/trufflehog@041f07e9df901a1038a528e5525b0226d04dd5ea # v3.93.6
        with:
          extra_args: --only-verified
      - name: Fluid Attacks secret scan
        run: docker run --rm -v "$PWD:/src" docker.io/fluidattacks/ss@sha256:ec6e5d73c68ecad3de94b14c14ccbc6eaef42be359f94b8ddc1a8a9f73d49c33 ss scan --strict /src

  security-sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Semgrep SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/owasp-top-ten
            p/react
            p/typescript
            p/secrets
      - name: Fluid Attacks SAST
        run: docker run --rm -v "$PWD:/src" docker.io/fluidattacks/sast@sha256:9354a4a0522cf14151878184c240d6f7a9a70f45a8775f984011a457489bd788 sast --strict scan /src

  security-sca:
    name: SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Fluid Attacks SCA
        run: docker run --rm -v "$PWD:/src" docker.io/fluidattacks/sca@sha256:a44ff1505a4b50cf09c862e33a7f404223c4927509ad6f7427431f3085caa90c sca --strict scan /src

  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest
    needs:
      - lint-gate
      - architecture
      - typecheck
      - test
      - crap
      - security-secrets
      - security-sast
      - security-sca
    if: ${{ always() }}
    steps:
      - name: Verify required jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more required jobs failed." >&2
            exit 1
          fi

          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs were cancelled." >&2
            exit 1
          fi
