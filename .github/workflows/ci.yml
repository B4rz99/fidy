name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-gate:
    name: Lint Gate (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Root
            command: bun run lint
          - name: Mobile ESLint
            command: bun run lint:mobile
          - name: Lizard complexity
            command: bun run lint:complexity
          - name: File size
            command: bun run lint:file-size
          - name: Dependency policy
            command: bun run lint:dependency-policy
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install
      - name: Run ${{ matrix.name }} gate
        run: ${{ matrix.command }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: lint-gate
    if: ${{ always() }}
    steps:
      - name: Lint gates passed
        run: test "${{ needs.lint-gate.result }}" = "success"

  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: Dependency cruiser
        run: bun run lint:architecture


  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: Typecheck workspace
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: bun install
      - name: Run tests with coverage
        run: bun run test:coverage

  security-sca:
    name: Security (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: Snyk dependency scan
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --exclude=.ai-hooks --severity-threshold=high

  security-sast:
    name: Security (SAST + Secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base ref
        run: git fetch origin ${{ github.event.pull_request.base.ref }}
      - name: Gitleaks — pattern-based secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: TruffleHog — verified secret scan
        uses: trufflesecurity/trufflehog@041f07e9df901a1038a528e5525b0226d04dd5ea # v3.93.6
        with:
          extra_args: --only-verified
      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/react
            p/typescript
            p/secrets
