name: Quality Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  dead-code:
    name: Dead Code
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: Knip
        run: bun run lint:dead-code

  duplication:
    name: Duplication
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: jscpd
        run: bun run lint:duplication

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: bun install
      - name: StrykerJS
        run: bun run test:mutation:mobile

  bundle-atlas:
    name: Bundle Atlas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: bun install
      - name: Export Expo bundle with Atlas
        run: bun run perf:bundle:mobile
      - name: Upload Atlas artifact
        uses: actions/upload-artifact@v4
        with:
          name: expo-atlas
          path: apps/mobile/.expo/atlas.jsonl
          include-hidden-files: true
