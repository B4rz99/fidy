name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: "Build profile"
        required: true
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: EAS Build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: 26.1.0

      - name: Install dependencies
        run: bun install --frozen-lockfile --minimum-release-age=0

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build
        working-directory: apps/mobile
        env:
          EAS_PLATFORM: ${{ inputs.platform }}
          EAS_PROFILE: ${{ inputs.profile }}
        run: eas build --platform "$EAS_PLATFORM" --profile "$EAS_PROFILE" --non-interactive
