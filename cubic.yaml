# yaml-language-server: $schema=https://cubic.dev/schema/cubic-repository-config.schema.json

version: 1
reviews:
  custom_rules:
    - name: Local Ledger Architecture Guardian
      description: |
        Review PRs for high-level architecture drift in Fidy's mobile app.

        Flag changes that weaken the Local Ledger Clean Architecture boundary documented in docs/adr/0005-local-ledger-clean-architecture-boundary.md and CONTEXT.md.

        Specifically flag PR code when:
        - apps/mobile/local-ledger/** imports UI, framework, infrastructure, or feature code, including app/**, features/**, modules/**, shared/db, Drizzle, React, React Native, Expo, Zustand, Supabase clients, analytics, logging, broad runtime barrels, or infrastructure/local-ledger/**.
        - Local Ledger use cases depend on concrete repositories, stores, write-through modules, database rows, generated IDs, wall-clock time, Sentry/logging, analytics, i18n, or UI strings instead of async ports, injected clock/id dependencies, typed result codes, and returned domain events.
        - Features, capture pipelines, review queues, calendar/bill flows, backup restore, or tests create/amend/void transactions, transfers, review candidates, processed source events, or account-attribution resolutions by calling feature repositories or database adapters directly instead of Local Ledger public surfaces or app-wired infrastructure composition.
        - Automated capture writes parser/merchant/counterparty text into user-authored transaction descriptions instead of counterpartyName, or uses description for merchant/category learning or duplicate detection.
        - Low-confidence capture creates committed transactions/transfers instead of Review Candidates, or high-confidence capture commits without deterministic validation, duplicate checks, account/category/account-attribution policy, and atomic Capture Evidence plus Processed Source Event linkage.
        - Transactions and transfers can be future-dated, zero/negative amount, hard-deleted, or written without validating account/user ownership and category usability where applicable.
        - Transfers are modeled as transaction categories or transaction types, counted as income/spending/budget consumption, or reclassification is not atomic with superseding the original transactions.
        - Backup/snapshot changes treat read models, analytics caches, query caches, or remote plaintext financial tables as Local Ledger source of truth.

        Prefer findings that identify a concrete boundary violation, missing invariant, or bypass path. Do not flag cosmetic naming, harmless read-model code, UI presentation choices, or intentionally separate feature-owned reads unless they enable canonical ledger writes to bypass Local Ledger policy.
      include:
        - apps/mobile/**
        - docs/adr/**
        - docs/superpowers/plans/**
        - CONTEXT.md
        - .dependency-cruiser.cjs
        - apps/mobile/eslint.config.js
      exclude:
        - apps/mobile/node_modules/**
        - apps/mobile/.expo/**
        - apps/mobile/coverage/**
        - apps/mobile/dist/**
    - name: Mobile UI Architecture Guardian
      description: |
        Review PRs for reusable UI architecture drift in Fidy's mobile app.

        Flag changes that weaken the shared mobile UI kit and glass surface rules documented in docs/adr/0006-mobile-ui-kit-and-semantic-theme-tokens.md.

        Specifically flag PR code when:
        - Feature code recreates reusable glass/card/row/field/action/chip/dialog/list surfaces with local `GlassSurface`, `Pressable` plus styled `View`, `StyleSheet` card containers, `bg-card`, `bg-card-dark`, `bg-surface`, `bg-surface-dark`, direct `card` theme reads, or local border/background/radius styling instead of shared primitives such as `Card`, `MetricCard`, `ListRowSurface`, `Row`, `FeedList`, `FieldSurface`, `FieldButton`, `FormTextField`, `FilterTextField`, `Button`, `IconActionButton`, `TextActionButton`, `Chip`, `FilterPill`, `SelectableChipRow`, `SegmentedControl`, `DialogFrame`, `PickerDialog`, or `PickerOptionRow`.
        - Interactive `TextInput` content is nested directly inside native liquid glass instead of using the shared field adapter pattern (`FieldSurface`, `FormTextField`, `FilterTextField`, or money-entry field modules) that keeps the glass frame behind the input.
        - A reusable primitive's visual contract is bypassed by pushing surface-level background, border, radius, padding, or disabled/selected styling through generic `style` or `className` overrides when the primitive has a named prop or variant for that behavior.
        - Feature code introduces a new recurring UI shape that would require repeated local `Pressable`/`View`/`GlassSurface` styling instead of extending or adding a shared primitive first.
        - Tests assert brittle implementation strings such as exact `contentStyle`, class fragments, local `flexDirection` strings, or formatting-sensitive source snippets for shared primitive behavior when a rendered component contract test would cover the behavior more directly.

        Do not flag domain-specific compositions or semantic visuals that are intentionally feature-owned: budget/goal/notification/account card content, category colors, chart marks, status/accent colors, avatars, icon badges, navigation chrome, chat bubbles, numpad keys, one-off layout containers without glass/card/row behavior, or source tests that guard route membership, public import boundaries, i18n keys, or architecture boundaries.

        Prefer findings that identify a concrete duplicated surface, primitive bypass, missing shared component variant, or brittle UI test. Avoid cosmetic spacing/color opinions unless they undermine the shared primitive contract or the app-wide glass visual system.
      include:
        - apps/mobile/**
        - docs/adr/0006-mobile-ui-kit-and-semantic-theme-tokens.md
        - cubic.yaml
      exclude:
        - apps/mobile/node_modules/**
        - apps/mobile/.expo/**
        - apps/mobile/coverage/**
        - apps/mobile/dist/**
