version: '2'

pre-commit:
  commands:
    oxlint:
      glob: '*.{js,jsx,ts,tsx}'
      run: bunx oxlint --fix {staged_files}
      skip_output: errors
    format:
      glob: '*.{js,jsx,ts,tsx,json}'
      run: bunx biome format --write {staged_files}
      skip_output: errors

commit-msg:
  commands:
    commit-msg-format:
      run: bun scripts/check-commit-message.ts {1}
    commit-body-format:
      run: bun scripts/check-commit-message.ts {1}

pre-push:
  commands:
    root-oxlint:
      files: git ls-files
      run: bun run lint
      skip_output: false
    branded-boundaries:
      files: git ls-files
      run: bun run lint:brands
      skip_output: false
    mobile-eslint:
      files: git ls-files
      run: bun run lint:mobile
      skip_output: false
    mobile-typecheck:
      files: git ls-files
      run: bun run typecheck
      skip_output: false
    complexity:
      files: git ls-files
      run: bun run lint:complexity
      skip_output: false
    file-size:
      files: git ls-files
      run: bun run lint:file-size
      skip_output: false
    dependency-policy:
      files: git ls-files
      run: bun run lint:dependency-policy
      skip_output: false
    tests:
      files: git ls-files
      run: bun run test
      skip_output: false
