version: '2'

pre-commit:
  commands:
    biome:
      glob: '*.{js,jsx,ts,tsx,json}'
      run: bunx biome check --write {staged_files}
      skip_output: errors
    format:
      glob: '*.{js,jsx,ts,tsx,json}'
      run: bunx biome format --write {staged_files}
      skip_output: errors

commit-msg:
  commands:
    commit-msg-format:
      run: >
        if ! head -1 {1} | grep -qE '^(feat|fix|refactor|chore|docs|test|perf|ci)\([a-z0-9\-]+\): .+$'; then
          echo "Commit message must follow format: type(scope): message (scope is required)";
          exit 1;
        fi
    commit-body-format:
      run: >
        BODY=$(tail -n +3 {1} | grep -v '^$' | grep -v '^#' || true);
        if [ -n "$BODY" ]; then
          BAD=$(echo "$BODY" | grep -v '^- ' || true);
          if [ -n "$BAD" ]; then
            echo "Commit body must contain bullet points only (- description)";
            exit 1;
          fi;
        fi

pre-push:
  commands:
    root-biome:
      run: bunx biome check .
      skip_output: false
    mobile-eslint:
      run: bun run --cwd apps/mobile lint
      skip_output: false
    mobile-typecheck:
      run: bun run --cwd apps/mobile typecheck
      skip_output: false
    tests:
      run: bun run test
      skip_output: false
